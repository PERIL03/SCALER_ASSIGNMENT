services:
  db:
    image: mysql:8.0
    container_name: calclone-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cal_clone
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  seed:
    build:
      context: ./server
    container_name: calclone-seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: mysql://app_user:app_password@db:3306/cal_clone
      DEFAULT_TIMEZONE: Asia/Kolkata
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-me-in-production
      GOOGLE_CLIENT_ID: your-google-oauth-web-client-id
      ASSIGNMENT_MODE: "true"
      ASSIGNMENT_DEFAULT_USER_ID: "1"
    command: npm run seed
    restart: "no"

  backend:
    build:
      context: ./server
    container_name: calclone-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      PORT: 4000
      DATABASE_URL: mysql://app_user:app_password@db:3306/cal_clone
      DEFAULT_TIMEZONE: Asia/Kolkata
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-me-in-production
      GOOGLE_CLIENT_ID: your-google-oauth-web-client-id
      ASSIGNMENT_MODE: "true"
      ASSIGNMENT_DEFAULT_USER_ID: "1"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: your-google-oauth-web-client-id
        NEXT_PUBLIC_ASSIGNMENT_MODE: "true"
    container_name: calclone-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mysql_data:
